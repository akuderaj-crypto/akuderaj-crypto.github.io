<!DOCTYPE html>

<body>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="places.html">Places</a></li>
            <li><a href="culture.html">Culture</a></li>

            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="enquiry.html" class="active">Enquiry</a></li>
        </ul>
    </nav>

    <main class="container">
        <h1>Tourist Enquiry Form</h1>
        <div class="card">
            <form id="touristForm">
                <label for="name">Name:</label>
                <input type="text" id="name" required>
                
                <label for="interest">Main Interest:</label>
                <select id="interest">
                    <option value="Spiritual">Spiritual Centers [cite: 4]</option>
                    <option value="History">Historic Monuments [cite: 4]</option>
                    <li><option value="Textiles">Textiles [cite: 9]</option></li>
                    <option value="Food">Local Cuisine [cite: 10]</option>
                </select>
                
                <label for="message">Message:</label>
                <textarea id="message" rows="4" placeholder="How can we help you plan your visit?"></textarea>
                
                <button type="submit">Submit Enquiry</button>
            </form>
            <div id="status"></div>
        </div>
    </main>

    <script src="enquiry.js"></script>
</body>
</html>
