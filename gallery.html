<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Photo Gallery - Solapur Tourism</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px 0;
        }
        .gallery-item {
            background: #fff;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .gallery-item:hover { transform: scale(1.05); }
        .gallery-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 5px;
        }
        .gallery-item p {
            margin-top: 10px;
            font-weight: bold;
            color: var(--secondary);
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <h1>Solapur Photo Gallery</h1>
        <p>A Visual Journey Through the City of Spirituality</p>
    </header>
    <nav>
        <a href="index.html">Home</a>
        <a href="places.html">Places</a>
        <a href="culture.html">Culture</a>
        <a href="travel.html">Travel Guide</a>
        <a href="food.html">Food</a>
        <a href="gallery.html">Gallery</a>
    </nav>
    <div class="container">
        <div class="gallery-grid">
            <div class="gallery-item">
                <img src="images/siddeshwar.jpg" alt="Siddheshwar Temple">
                <p>Siddheshwar Temple</p>
            </div>
            <div class="gallery-item">
                <img src="images/siddeshwar_night.jpg" alt="Siddheshwar Temple at Night">
                <p>Temple Night View</p>
            </div>
            <div class="gallery-item">
                <img src="images/pandharpur1.jpg" alt="Pandharpur 1">
                <p>Pandharpur Darshan</p>
            </div>
            <div class="gallery-item">
                <img src="images/pandharpur2.jpg" alt="Pandharpur 2">
                <p>Vitthal Rukmini Temple</p>
            </div>
            <div class="gallery-item">
                <img src="images/tuljapur1.jpg" alt="Tuljapur 1">
                <p>Tulja Bhavani Temple</p>
            </div>
            <div class="gallery-item">
                <img src="images/tuljapur2.jpg" alt="Tuljapur 2">
                <p>Tuljapur Architecture</p>
            </div>
            <div class="gallery-item">
                <img src="images/tuljapur3.jpg" alt="Tuljapur 3">
                <p>Spiritual Tuljapur</p>
            </div>
        </div>
    </div>
    <footer><p>&copy; 2026 Solapur Tourism Guide</p></footer>
</body>
</html>
